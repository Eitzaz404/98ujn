<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Eitzaz Hassan | Software Engineering Student</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f8faff 0%, #eef2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.4;
    }
    .profile-container {
      max-width: 880px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 3rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.02);
      padding: 2.5rem 2rem 3rem 2rem;
      border: 1px solid rgba(255,255,255,0.6);
    }
    .profile-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    /* Profile image styling */
    .profile-img {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.5rem;
      box-shadow: 0 15px 25px -10px rgba(30, 43, 110, 0.3);
      border: 3px solid white;
      transition: transform 0.25s;
    }
    .profile-img:hover {
      transform: scale(1.02);
    }
    .name {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(120deg, #0a1f44, #1f3a8a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.4rem;
      font-weight: 500;
      color: #2c3e66;
      background: #eef2ff;
      display: inline-block;
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      margin-bottom: 1.25rem;
    }
    .description {
      max-width: 600px;
      margin: 1rem auto 0 auto;
      color: #1f2a44;
      font-size: 1.08rem;
      line-height: 1.55;
      font-weight: 400;
      background: #f9fafd;
      padding: 0.8rem 1.4rem;
      border-radius: 2rem;
      border: 1px solid #e2e8f0;
    }
    .description p {
      margin: 0;
    }
    .highlight {
      font-weight: 600;
      color: #1f3a8a;
    }
    .button-group {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 2rem 0 2.2rem 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.85rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.25s;
      cursor: pointer;
      text-decoration: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      background: #1f3a8a;
      color: white;
      box-shadow: 0 5px 12px rgba(31, 58, 138, 0.25);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-primary:hover {
      background: #102a6e;
      transform: translateY(-3px);
      box-shadow: 0 12px 22px -8px rgba(31, 58, 138, 0.4);
    }
    .btn-outline {
      background: transparent;
      color: #1f3a8a;
      border: 1.5px solid #1f3a8a;
    }
    .btn-outline:hover {
      background: #1f3a8a0c;
      transform: translateY(-2px);
      border-color: #102a6e;
      color: #0f2a6b;
      box-shadow: 0 6px 12px -6px rgba(0,0,0,0.1);
    }
    .scroll-down {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 1rem;
      opacity: 0.7;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .scroll-down span {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: #2c3e66;
      text-transform: uppercase;
    }
    .scroll-down i {
      font-size: 1.6rem;
      color: #1f3a8a;
      animation: bounce 1.8s infinite ease;
    }
    .scroll-down:hover {
      opacity: 1;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }
    .divider-light {
      width: 70px;
      height: 3px;
      background: #cdd9ff;
      margin: 1.2rem auto 0.6rem auto;
      border-radius: 4px;
    }
    @media (max-width: 550px) {
      .profile-container {
        padding: 1.8rem 1.2rem 2.2rem 1.2rem;
      }
      .name { font-size: 2rem; }
      .tagline { font-size: 1.1rem; padding: 0.2rem 1rem; }
      .btn { padding: 0.7rem 1.4rem; font-size: 0.9rem; }
      .description { font-size: 0.95rem; padding: 0.6rem 1rem; }
      .profile-img { width: 88px; height: 88px; }
    }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

<div class="profile-container">
  <div class="profile-inner">
    <!-- PROFILE IMAGE: Replace src with your image URL -->
    <img class="profile-img" 
         src="https://via.placeholder.com/112?text=Your+Image" 
         alt="Eitzaz Hassan profile picture">

    <h1 class="name">Eitzaz Hassan</h1>
    <div class="tagline">🚀 Aspiring Software Engineer</div>
    <div class="description">
      <p>
        <span class="highlight">2nd Semester</span> Software Engineering Student at 
        <strong>University of Gujrat</strong>.<br>
        Passionate about building web experiences, competitive debate, and turning ideas into code.
      </p>
    </div>
    <div class="button-group">
      <a href="#" class="btn btn-primary" id="viewProjectsBtn">
        <i class="fas fa-code-branch"></i> View Projects
      </a>
      <a href="#" class="btn btn-outline" id="contactMeBtn">
        <i class="fas fa-envelope"></i> Contact Me
      </a>
    </div>
    <div class="divider-light"></div>
    <div class="scroll-down" id="scrollDownTrigger">
      <span>SCROLL DOWN</span>
      <i class="fas fa-chevron-down"></i>
    </div>
  </div>
</div>

<script>
  (function() {
    const projectsBtn = document.getElementById('viewProjectsBtn');
    const contactBtn = document.getElementById('contactMeBtn');
    const scrollTrigger = document.getElementById('scrollDownTrigger');
    
    if (projectsBtn) {
      projectsBtn.addEventListener('click', (e) => {
        e.preventDefault();
        alert("✨ Explore Projects:\n\n• Portfolio Website (React)\n• Debate Tracker App\n• University Management CLI\n• Full-stack JavaScript projects coming soon!\n\nCheck out GitHub for more details.");
      });
    }
    if (contactBtn) {
      contactBtn.addEventListener('click', (e) => {
        e.preventDefault();
        alert("📬 Contact Eitzaz Hassan:\n\n✉️ Email: eitzaz.hassan@example.com\n💼 LinkedIn: /in/eitzaz-hassan\n🌐 GitHub: @eitzaz-dev\n\nLet's connect and build something awesome!");
      });
    }
    if (scrollTrigger) {
      scrollTrigger.addEventListener('click', () => {
        // Smooth scroll to a dummy extra section or just to bottom of page
        const extraSection = document.getElementById('extraAboutSection');
        if (extraSection) {
          extraSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollBy({ top: 400, behavior: 'smooth' });
        }
      });
    }

    // Optional: add an extra section to scroll to (makes "SCROLL DOWN" meaningful)
    if (!document.getElementById('extraAboutSection')) {
      const extraDiv = document.createElement('div');
      extraDiv.id = 'extraAboutSection';
      extraDiv.style.maxWidth = '880px';
      extraDiv.style.margin = '1rem auto 2rem auto';
      extraDiv.style.padding = '1.8rem 2rem';
      extraDiv.style.backgroundColor = '#ffffffcc';
      extraDiv.style.backdropFilter = 'blur(4px)';
      extraDiv.style.borderRadius = '2rem';
      extraDiv.style.border = '1px solid rgba(31,58,138,0.2)';
      extraDiv.style.fontFamily = "'Inter', sans-serif";
      extraDiv.style.textAlign = 'center';
      extraDiv.innerHTML = `
        <h3 style="color:#1f3a8a; margin-bottom:0.75rem;">✨ More About Eitzaz</h3>
        <p style="color:#2d3a5e;">🏆 Competitive Debater | 💻 Web enthusiast | 🌱 Currently learning MERN stack & DSA<br>
        📍 Gujrat, Pakistan — open for collaborations and tech discussions.</p>
      `;
      document.body.appendChild(extraDiv);
    }
  })();
</script>
</body>
</html>
